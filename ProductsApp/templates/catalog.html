{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог — khikmatillaev's</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --burgundy:#AE1F23;--deep-burgundy:#4E0000;--wine:#4E0000;--maroon:#AE1F23;
            --cream:#FFF8F0;--milk:#FFFBF7;--beige:#F5E6D3;--rose:#FFE4E9;--rose2:#FFD1DC;
            --white:#ffffff;--g50:#f8fafc;--g100:#f1f5f9;--g200:#e2e8f0;--g300:#cbd5e1;
            --g500:#64748b;--g600:#475569;--g700:#334155;--g800:#1e293b;--g900:#0f172a;
            --gold:#D4AF37;--red:#ef4444;
        }
        html{scroll-behavior:smooth}
        body{font-family:'Inter',sans-serif;background:var(--g50);color:var(--g800)}

        /* NAV */
        .nav{background:var(--white);border-bottom:1px solid var(--g200);padding:.9rem 0;position:sticky;top:0;z-index:100}
        .nav-inner{max-width:1400px;margin:0 auto;padding:0 2rem;display:flex;justify-content:space-between;align-items:center}
        .logo{font-size:1.5rem;font-weight:900;text-decoration:none;font-family:'Playfair Display',serif;font-style:italic;color:var(--deep-burgundy)}
        .nav-links{display:flex;gap:1.5rem;list-style:none;align-items:center}
        .nav-links a{text-decoration:none;color:var(--g600);font-weight:500;font-size:.9rem;transition:color .3s}
        .nav-links a:hover{color:var(--burgundy)}

        /* HERO BANNER */
        .page-hero{background:linear-gradient(135deg,var(--deep-burgundy),var(--burgundy));color:var(--cream);padding:2.5rem 2rem;text-align:center}
        .page-hero h1{font-size:2.2rem;font-weight:800;margin-bottom:.4rem;font-family:'Playfair Display',serif}
        .page-hero p{font-size:1rem;opacity:.75}
        .breadcrumb{display:flex;gap:.5rem;justify-content:center;align-items:center;margin-top:.75rem;font-size:.85rem;opacity:.6}
        .breadcrumb a{color:var(--cream);text-decoration:none}
        .breadcrumb a:hover{text-decoration:underline}

        /* LAYOUT */
        .layout{max-width:1400px;margin:0 auto;padding:2rem;display:grid;grid-template-columns:280px 1fr;gap:2rem}

        /* SIDEBAR */
        .sidebar{background:var(--white);border-radius:16px;padding:1.5rem;height:fit-content;position:sticky;top:80px;
            box-shadow:0 1px 4px rgba(0,0,0,.05);border:1px solid var(--g200)}
        .sidebar-title{font-size:1rem;font-weight:700;color:var(--g900);margin-bottom:1.25rem;display:flex;align-items:center;gap:.5rem}
        .sidebar-title i{color:var(--burgundy)}
        .sb-group{margin-bottom:1.5rem}
        .sb-group h4{font-size:.75rem;font-weight:700;color:var(--g500);text-transform:uppercase;letter-spacing:1px;margin-bottom:.75rem}
        .search-box{width:100%;padding:.7rem .9rem;border:2px solid var(--g200);border-radius:10px;font-family:'Inter',sans-serif;
            font-size:.88rem;transition:border-color .3s;background:var(--g50)}
        .search-box:focus{outline:none;border-color:var(--burgundy);background:var(--white)}
        .cat-list{display:flex;flex-direction:column;gap:.35rem}
        .cat-item{padding:.65rem .9rem;border-radius:10px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:.65rem;
            font-size:.9rem;color:var(--g700);border:1px solid transparent}
        .cat-item:hover{background:var(--rose);border-color:var(--rose2)}
        .cat-item.active{background:var(--rose);border-color:var(--burgundy);color:var(--burgundy);font-weight:600}
        .cat-item .ci-icon{font-size:1.3rem}
        .cat-item .ci-count{margin-left:auto;font-size:.75rem;background:var(--g100);padding:.2rem .5rem;border-radius:20px;color:var(--g500);font-weight:600}
        .cat-item.active .ci-count{background:var(--burgundy);color:var(--white)}
        .sub-list{margin-left:1.8rem;margin-top:.35rem;display:flex;flex-direction:column;gap:.25rem}
        .sub-item{padding:.45rem .75rem;border-radius:8px;cursor:pointer;font-size:.85rem;color:var(--g600);transition:all .2s;
            border:1px solid transparent}
        .sub-item:hover{background:var(--rose);color:var(--burgundy)}
        .sub-item.active{background:var(--burgundy);color:var(--white);font-weight:600}
        .sb-badge{display:flex;flex-direction:column;gap:.35rem}
        .badge-btn{padding:.5rem .75rem;border-radius:8px;cursor:pointer;font-size:.85rem;border:1px solid var(--g200);
            background:var(--g50);transition:all .2s;text-align:left;color:var(--g700)}
        .badge-btn:hover{border-color:var(--burgundy);background:var(--rose)}
        .badge-btn.active{border-color:var(--burgundy);background:var(--rose);color:var(--burgundy);font-weight:600}
        .btn-reset{width:100%;padding:.7rem;background:var(--g100);border:1px solid var(--g200);border-radius:10px;
            cursor:pointer;font-weight:600;font-family:'Inter',sans-serif;font-size:.85rem;color:var(--g600);transition:all .2s;margin-top:.5rem}
        .btn-reset:hover{background:var(--g200)}

        /* PRODUCTS AREA */
        .products-area{min-height:600px}
        .pa-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem}
        .pa-count{font-size:.9rem;color:var(--g500)}
        .pa-count strong{color:var(--g900);font-weight:700}
        .pa-sort select{padding:.5rem .75rem;border:2px solid var(--g200);border-radius:8px;font-family:'Inter',sans-serif;font-size:.85rem;
            background:var(--white);cursor:pointer}
        .pa-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:1.5rem}
        .p-card{background:var(--white);border-radius:14px;overflow:hidden;transition:all .3s;cursor:pointer;border:1px solid var(--g200)}
        .p-card:hover{transform:translateY(-4px);box-shadow:0 12px 35px rgba(139,21,56,.1);border-color:var(--burgundy)}
        .p-img{width:100%;height:290px;background:linear-gradient(135deg,var(--rose),var(--g100));display:flex;align-items:center;
            justify-content:center;font-size:5rem;position:relative;overflow:hidden}
        .p-img img{width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;opacity:0;transition:opacity .4s ease}
        .p-img img.active{opacity:1}
        .p-img-hover-zones{position:absolute;inset:0;display:none;z-index:3;pointer-events:none}
        .p-img[data-has-slider="true"] .p-img-hover-zones{display:flex}
        .hover-zone{flex:1;pointer-events:all;cursor:pointer}
        .hover-zone-left{background:linear-gradient(to right,rgba(0,0,0,.1),transparent)}
        .hover-zone-right{background:linear-gradient(to left,rgba(0,0,0,.1),transparent)}
        .hover-zone:hover{background:rgba(0,0,0,.15)}
        .p-img-nav{position:absolute;bottom:0;left:0;right:0;display:flex;gap:4px;padding:8px;justify-content:center;
            background:linear-gradient(to top,rgba(0,0,0,.5),transparent);z-index:2;opacity:0;transition:opacity .3s}
        .p-img:hover .p-img-nav{opacity:1}
        .p-img-dot{width:100%;height:3px;background:rgba(255,255,255,.4);border-radius:2px;cursor:pointer;transition:all .3s}
        .p-img-dot.active{background:var(--white);height:4px}
        .p-img-emoji{font-size:5rem;z-index:1}
        .p-card:hover .p-img img{transform:scale(1.05)}
        .p-badge{position:absolute;top:.75rem;left:.75rem;padding:.3rem .8rem;border-radius:20px;font-size:.7rem;font-weight:700;
            text-transform:uppercase;letter-spacing:.5px}
        .b-new{background:var(--burgundy);color:var(--white)}
        .b-hot{background:var(--red);color:var(--white)}
        .b-sale{background:var(--gold);color:var(--white)}
        .p-wish{position:absolute;top:.75rem;right:.75rem;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.9);
            display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;border:none;color:var(--g500)}
        .p-wish:hover{color:var(--red);background:var(--white)}
        .p-body{padding:1.25rem}
        .p-cat{font-size:.73rem;color:var(--burgundy);font-weight:600;text-transform:uppercase;letter-spacing:.5px;margin-bottom:.35rem}
        .p-subcat{font-size:.75rem;color:var(--g500);margin-bottom:.35rem}
        .p-name{font-size:1rem;font-weight:700;color:var(--g900);margin-bottom:.6rem;line-height:1.4}
        .p-price{display:flex;align-items:center;gap:.6rem}
        .p-price-now{font-size:1.25rem;font-weight:800;color:var(--deep-burgundy)}
        .p-price-old{font-size:.88rem;color:var(--g500);text-decoration:line-through}
        .p-sizes{display:flex;gap:.35rem;flex-wrap:wrap;margin-top:.75rem}
        .p-size{padding:.2rem .5rem;background:var(--g100);border-radius:4px;font-size:.7rem;font-weight:600;color:var(--g600)}
        .p-order{width:100%;padding:.7rem;background:linear-gradient(135deg,var(--deep-burgundy),var(--burgundy));color:var(--white);border:none;
            border-radius:10px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;margin-top:1rem;transition:all .3s;
            font-size:.88rem;display:flex;align-items:center;justify-content:center;gap:.4rem}
        .p-order:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(139,21,56,.3)}
        .no-prods{text-align:center;padding:4rem 2rem;color:var(--g500);grid-column:1/-1}
        .no-prods i{font-size:4rem;color:var(--g200);margin-bottom:1rem}

        /* MODAL */
        .modal{display:none;position:fixed;inset:0;background:rgba(139,21,56,.6);z-index:1000;align-items:center;justify-content:center;
            padding:1rem;backdrop-filter:blur(4px)}
        .modal.active{display:flex}
        .modal-box{background:var(--white);padding:0;border-radius:20px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto;
            animation:modalIn .3s ease}
        @keyframes modalIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
        .modal-top{padding:1.5rem;border-bottom:1px solid var(--g200);display:flex;justify-content:space-between;align-items:center}
        .modal-top h2{font-size:1.3rem;font-weight:700}
        .modal-x{background:var(--g100);border:none;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:1.1rem;color:var(--g600);transition:all .2s}
        .modal-x:hover{background:var(--g200)}
        .modal-body{padding:1.5rem}
        .modal-prod{display:flex;gap:1rem;padding:1rem;background:var(--g50);border-radius:12px;margin-bottom:1.5rem}
        .modal-prod-img{width:70px;height:70px;border-radius:10px;background:var(--rose);display:flex;align-items:center;
            justify-content:center;font-size:2rem;overflow:hidden;flex-shrink:0}
        .modal-prod-img img{width:100%;height:100%;object-fit:cover}
        .modal-prod-info{flex:1}
        .modal-prod-name{font-weight:700;color:var(--g900);margin-bottom:.25rem}
        .modal-prod-price{font-size:1rem;font-weight:700;color:var(--burgundy)}
        .fg{margin-bottom:1rem}
        .fg label{display:block;font-size:.8rem;font-weight:600;color:var(--g700);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.4rem}
        .fg input,.fg select{width:100%;padding:.7rem;border:2px solid var(--g200);border-radius:10px;font-family:'Inter',sans-serif;font-size:.9rem;
            background:var(--white);transition:border-color .3s}
        .fg input:focus,.fg select:focus{outline:none;border-color:var(--blue)}
        .fg input[readonly]{background:var(--g50);color:var(--g500)}
        .size-select{display:flex;gap:.5rem;flex-wrap:wrap}
        .size-opt{padding:.5rem 1rem;border:2px solid var(--g200);border-radius:10px;cursor:pointer;font-size:.85rem;font-weight:600;
            transition:all .2s;background:var(--white)}
        .size-opt:hover{border-color:var(--burgundy);background:var(--rose)}
        .size-opt.selected{border-color:var(--burgundy);background:var(--burgundy);color:var(--white)}
        .btn-send{width:100%;padding:.9rem;background:linear-gradient(135deg,var(--deep-burgundy),var(--burgundy));color:var(--white);border:none;
            border-radius:10px;font-weight:700;font-size:.95rem;cursor:pointer;transition:all .3s;display:flex;align-items:center;
            justify-content:center;gap:.5rem;margin-top:.5rem}
        .btn-send:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(139,21,56,.3)}

        /* FOOTER */
        .footer{background:var(--g900);color:var(--cream);padding:2rem;text-align:center;margin-top:4rem}
        .footer p{color:var(--g500);font-size:.85rem}

        /* MOBILE */
        .mob-filter-btn{display:none;position:fixed;bottom:1.5rem;right:1.5rem;z-index:90;background:var(--burgundy);color:var(--white);
            width:56px;height:56px;border-radius:50%;border:none;font-size:1.3rem;cursor:pointer;box-shadow:0 4px 20px rgba(139,21,56,.4)}
        @media(max-width:968px){
            .layout{grid-template-columns:1fr}
            .sidebar{position:fixed;top:0;left:-320px;width:300px;height:100vh;z-index:200;border-radius:0;overflow-y:auto;
                transition:left .3s ease;box-shadow:4px 0 30px rgba(0,0,0,.2)}
            .sidebar.open{left:0}
            .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:190}
            .sidebar-overlay.open{display:block}
            .mob-filter-btn{display:flex;align-items:center;justify-content:center}
            .nav-links{display:none}
        }
    </style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
    <div class="nav-inner">
        <a href="/" class="logo">khikmatillaev's</a>
        <ul class="nav-links">
            <li><a href="/">Главная</a></li>
            <li><a href="/catalog/" style="color:var(--burgundy);font-weight:600">Каталог</a></li>
            {% if admin_tg %}<li><a href="https://t.me/{{ admin_tg }}" target="_blank">Контакты</a></li>{% endif %}
        </ul>
    </div>
</nav>

<!-- HERO -->
<div class="page-hero">
    <h1>Каталог</h1>
    <p>Все наши товары в одном месте</p>
    <div class="breadcrumb">
        <a href="/">Главная</a>
        <span>/</span>
        <span>Каталог</span>
    </div>
</div>

<!-- MOBILE OVERLAY -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

<!-- LAYOUT -->
<div class="layout">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-title"><i class="fas fa-sliders"></i> Фильтры</div>

        <div class="sb-group">
            <h4>Поиск</h4>
            <input type="text" id="searchInput" class="search-box" placeholder="Название товара...">
        </div>

        <div class="sb-group">
            <h4>Размер</h4>
            <div class="sb-badge" id="sizeList"></div>
        </div>

        <button class="btn-reset" onclick="resetFilters()"><i class="fas fa-undo"></i> Сбросить</button>
    </aside>

    <!-- PRODUCTS -->
    <section class="products-area">
        <div class="pa-header">
            <div class="pa-count"><strong id="prodCount">0</strong> товаров</div>
            <div class="pa-sort">
                <select id="sortSelect" onchange="filterProducts()">
                    <option value="newest">Новые</option>
                    <option value="price_asc">Цена: по возрастанию</option>
                    <option value="price_desc">Цена: по убыванию</option>
                    <option value="name">По названию</option>
                </select>
            </div>
        </div>
        <div class="pa-grid" id="prodGrid"></div>
    </section>
</div>

<!-- MOBILE FILTER BUTTON -->
<button class="mob-filter-btn" onclick="openSidebar()"><i class="fas fa-filter"></i></button>

<!-- ORDER MODAL -->
<div class="modal" id="orderModal" onclick="if(event.target===this)closeModal()">
    <div class="modal-box">
        <div class="modal-top">
            <h2><i class="fas fa-shopping-bag" style="color:var(--burgundy)"></i> Оформить заказ</h2>
            <button class="modal-x" onclick="closeModal()"><i class="fas fa-times"></i></button>
        </div>
        <div class="modal-body">
            <div class="modal-prod" id="modalProd"></div>
            <form id="orderForm">
                <div class="fg">
                    <label>Размер *</label>
                    <div class="size-select" id="sizeSelect"></div>
                </div>
                <button type="submit" class="btn-send"><i class="fas fa-paper-plane"></i> Отправить заказ</button>
            </form>
        </div>
    </div>
</div>

<!-- FOOTER -->
<footer class="footer">
    <p>&copy; 2026 khikmatillaev's. Все права защищены.</p>
</footer>

<script>
let allProducts=[], allSizes=[];
let currentSize='', currentProduct=null, selectedSize='';

document.addEventListener('DOMContentLoaded',()=>{
    loadSizes();
    loadProducts();
    document.getElementById('searchInput').addEventListener('input',debounce(filterProducts,300));
});

function debounce(fn,ms){let t;return function(...a){clearTimeout(t);t=setTimeout(()=>fn.apply(this,a),ms)}}

async function loadSizes(){
    try{
        const r=await fetch('/api/sizes/');
        const d=await r.json();
        allSizes=d.sizes||[];
        renderSizes();
    }catch(e){console.error(e)}
}

function renderSizes(){
    const el=document.getElementById('sizeList');
    el.innerHTML=`<div class="badge-btn active" data-size="" onclick="selectSize(this,'')">Все размеры</div>`+
        allSizes.map(s=>`<div class="badge-btn" data-size="${s}" onclick="selectSize(this,'${s}')">${s}</div>`).join('');
}

function selectSize(el,s){
    document.querySelectorAll('#sizeList .badge-btn').forEach(x=>x.classList.remove('active'));
    el.classList.add('active');
    currentSize=s;
    filterProducts();
}

async function loadProducts(){
    try{
        const r=await fetch('/api/products/');
        allProducts=await r.json();
        filterProducts();
    }catch(e){console.error(e)}
}

function filterProducts(){
    let f=[...allProducts];
    if(currentSize)f=f.filter(p=>p.sizes&&p.sizes.includes(currentSize));
    const q=document.getElementById('searchInput').value.toLowerCase().trim();
    if(q)f=f.filter(p=>p.name.toLowerCase().includes(q)||p.description.toLowerCase().includes(q));
    const s=document.getElementById('sortSelect').value;
    if(s==='price_asc')f.sort((a,b)=>a.price-b.price);
    else if(s==='price_desc')f.sort((a,b)=>b.price-a.price);
    else if(s==='name')f.sort((a,b)=>a.name.localeCompare(b.name));
    else f.sort((a,b)=>b.id-a.id);
    renderProducts(f);
}

function renderProducts(prods){
    const g=document.getElementById('prodGrid');
    document.getElementById('prodCount').textContent=prods.length;
    if(!prods.length){
        g.innerHTML=`<div class="no-prods"><i class="fas fa-box-open"></i><h3>Товары не найдены</h3><p>Попробуйте изменить фильтры</p></div>`;
        return;
    }
    const badgeMap={'new':'Новинка','hot':'Хит','sale':'Скидка'};
    g.innerHTML=prods.map((p,idx)=>{
        const dp=p.discount_percent>0?Math.round(p.price*(1-p.discount_percent/100)):null;
        const imgs=p.images&&p.images.length?p.images:[];
        const hasImages=imgs.length>0&&imgs[0]!=='👕';
        const hasMultiple=imgs.length>1;

        let imgHTML='';
        if(!hasImages){
            imgHTML='<div class="p-img-emoji">👕</div>';
        }else{
            imgHTML=imgs.map((src,i)=>`<img src="${src}" alt="${p.name}" loading="lazy" class="${i===0?'active':''}" data-index="${i}">`).join('');
            if(hasMultiple){
                imgHTML+=`<div class="p-img-hover-zones">
                    <div class="hover-zone hover-zone-left" data-direction="prev"></div>
                    <div class="hover-zone hover-zone-right" data-direction="next"></div>
                </div>`;
                imgHTML+=`<div class="p-img-nav">${imgs.map((s,i)=>`<div class="p-img-dot ${i===0?'active':''}" data-index="${i}"></div>`).join('')}</div>`;
            }
        }

        return`<div class="p-card" onclick="openModal(${p.id})" data-card-id="${idx}">
            <div class="p-img" data-has-slider="${hasMultiple}">${imgHTML}
                ${p.badge?`<span class="p-badge b-${p.badge}">${badgeMap[p.badge]||''}</span>`:''}
            </div>
            <div class="p-body">
                <div class="p-cat">${p.category||''}</div>
                <h3 class="p-name">${p.name}</h3>
                <div class="p-price">
                    <span class="p-price-now">${fmt(dp||p.price)}</span>
                    ${dp?`<span class="p-price-old">${fmt(p.price)}</span>`:''}
                </div>
                ${p.sizes&&p.sizes.length?`<div class="p-sizes">${p.sizes.slice(0,4).map(s=>`<span class="p-size">${s}</span>`).join('')}${p.sizes.length>4?`<span class="p-size">+${p.sizes.length-4}</span>`:''}</div>`:''}
                <button class="p-order" onclick="event.stopPropagation();openModal(${p.id})"><i class="fas fa-shopping-cart"></i> Заказать</button>
            </div>
        </div>`;
    }).join('');
    initImageSliders();
}

function initImageSliders(){
    document.querySelectorAll('.p-img[data-has-slider="true"]').forEach(container=>{
        const imgs=container.querySelectorAll('img');
        const dots=container.querySelectorAll('.p-img-dot');
        const leftZone=container.querySelector('.hover-zone-left');
        const rightZone=container.querySelector('.hover-zone-right');
        if(imgs.length<=1||!leftZone||!rightZone)return;

        let currentIdx=0;
        let touchStart=0;
        let hoverTimeout=null;

        function showImage(idx){
            if(idx<0)idx=imgs.length-1;
            if(idx>=imgs.length)idx=0;
            currentIdx=idx;
            imgs.forEach((img,i)=>img.classList.toggle('active',i===idx));
            dots.forEach((dot,i)=>dot.classList.toggle('active',i===idx));
        }

        // Continuous navigation on hover
        function startHover(direction){
            if(hoverTimeout)clearTimeout(hoverTimeout);
            showImage(direction==='prev'?currentIdx-1:currentIdx+1);
            hoverTimeout=setTimeout(()=>{
                if(container.querySelector('.hover-zone:hover')){
                    startHover(direction);
                }
            },600);
        }

        leftZone.addEventListener('mouseenter',()=>{
            startHover('prev');
        });

        rightZone.addEventListener('mouseenter',()=>{
            startHover('next');
        });

        leftZone.addEventListener('mouseleave',()=>{
            if(hoverTimeout){
                clearTimeout(hoverTimeout);
                hoverTimeout=null;
            }
        });

        rightZone.addEventListener('mouseleave',()=>{
            if(hoverTimeout){
                clearTimeout(hoverTimeout);
                hoverTimeout=null;
            }
        });

        // Click on dots
        dots.forEach((dot,i)=>{
            dot.addEventListener('click',(e)=>{
                e.preventDefault();
                e.stopPropagation();
                if(hoverTimeout)clearTimeout(hoverTimeout);
                showImage(i);
            });
        });

        // Touch swipe
        container.addEventListener('touchstart',(e)=>{
            touchStart=e.changedTouches[0].screenX;
        },{passive:true});

        container.addEventListener('touchend',(e)=>{
            const touchEnd=e.changedTouches[0].screenX;
            const diff=touchStart-touchEnd;
            if(Math.abs(diff)>50){
                showImage(diff>0?currentIdx+1:currentIdx-1);
            }
        },{passive:true});

        // Reset to first image when mouse leaves card
        container.closest('.p-card').addEventListener('mouseleave',()=>{
            if(hoverTimeout)clearTimeout(hoverTimeout);
            setTimeout(()=>showImage(0),200);
        });
    });
}

function fmt(n){return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,' ')+" сум"}

function openModal(id){
    const p=allProducts.find(x=>x.id===id);
    if(!p)return;
    currentProduct=p;
    selectedSize='';
    const dp=p.discount_percent>0?Math.round(p.price*(1-p.discount_percent/100)):p.price;
    const img=p.images&&p.images[0]?`<img src="${p.images[0]}" alt="${p.name}">`:'👕';
    document.getElementById('modalProd').innerHTML=`
        <div class="modal-prod-img">${img}</div>
        <div class="modal-prod-info">
            <div class="modal-prod-name">${p.name}</div>
            <div style="font-size:.8rem;color:var(--g500);margin-bottom:.25rem">${p.category||''}</div>
            <div class="modal-prod-price">${fmt(dp)}</div>
        </div>`;
    const sc=document.getElementById('sizeSelect');
    if(p.sizes&&p.sizes.length){
        sc.innerHTML=p.sizes.map(s=>`<div class="size-opt" onclick="pickSize(this,'${s}')">${s}</div>`).join('');
    }else{
        sc.innerHTML='<div style="color:var(--g500);font-size:.85rem">Размеры не указаны</div>';
    }
    document.getElementById('orderModal').classList.add('active');
}

function pickSize(el,s){
    document.querySelectorAll('.size-opt').forEach(x=>x.classList.remove('selected'));
    el.classList.add('selected');
    selectedSize=s;
}

function closeModal(){document.getElementById('orderModal').classList.remove('active');currentProduct=null}

const ADMIN_TG="{{ admin_tg }}";

document.getElementById('orderForm').addEventListener('submit',async function(e){
    e.preventDefault();
    if(!currentProduct)return;
    if(!selectedSize&&currentProduct.sizes&&currentProduct.sizes.length){alert("Выберите размер!");return}
    const dp=currentProduct.discount_percent>0?Math.round(currentProduct.price*(1-currentProduct.discount_percent/100)):currentProduct.price;
    const text=`Привет! Хочу заказать:\n\n👕 ${currentProduct.name}${selectedSize?' | Размер: '+selectedSize:''}\n💰 Цена: ${fmt(dp)}\n\nЖду подтверждения!`;
    const url=`https://t.me/${ADMIN_TG}?text=${encodeURIComponent(text)}`;
    window.open(url,'_blank');
    closeModal();
});

function resetFilters(){
    currentSize='';
    document.getElementById('searchInput').value='';
    document.querySelectorAll('#sizeList .badge-btn').forEach(x=>x.classList.remove('active'));
    document.querySelector('#sizeList .badge-btn[data-size=""]').classList.add('active');
    filterProducts();
}

function openSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('sidebarOverlay').classList.add('open')}
function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebarOverlay').classList.remove('open')}
</script>
